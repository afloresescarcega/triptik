<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>triptik · three-panel HN</title>
  <meta name="description" content="A three-panel navigator for Hacker News comment threads."/>
  <meta property="og:title" content="triptik"/>
  <meta property="og:description" content="A three-panel navigator for Hacker News comment threads."/>
  <meta property="og:type" content="website"/>
  <meta name="theme-color" content="#f4f0e6"/>
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;▦&lt;/text&gt;&lt;/svg&gt;"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&family=Kalam:wght@400;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>

  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { background: #f4f0e6; overscroll-behavior: none; }
    * { box-sizing: border-box; }

    @keyframes slideFromBelow { from { transform: translateY(52%); opacity: 0.2; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideFromAbove { from { transform: translateY(-40%); opacity: 0.2; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideFromRight { from { transform: translateX(30%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideFromLeft  { from { transform: translateX(-30%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { opacity: 0.35; } 50% { opacity: 0.75; } 100% { opacity: 0.35; } }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.3); }

    button:focus-visible { outline: 2px solid currentColor; outline-offset: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

  <script src="app.js"></script>
</body>
</html>
